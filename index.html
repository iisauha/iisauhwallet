<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/iisauhwallet/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/iisauhwallet/icon.png" />
    <meta name="theme-color" content="#252526" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script>
      (function() {
        try {
          var bg = localStorage.getItem('iisauhwallet_app_theme_color_v1');
          if (bg && /^#[0-9A-Fa-f]{6}$/.test(bg)) {
            document.documentElement.style.setProperty('--bg', bg);
            var mt = document.querySelector('meta[name="theme-color"]');
            if (mt) mt.setAttribute('content', bg);
          }
        } catch(e) {}
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- CSP: allow Plaid Link and reCAPTCHA (required for bank connection flow) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.plaid.com https://www.google.com https://www.gstatic.com; connect-src 'self' https://cdn.plaid.com https://production.plaid.com https://sandbox.plaid.com https://development.plaid.com https://www.google.com https://www.gstatic.com https://recaptcha.google.com https://www.recaptcha.net http://localhost:* https://localhost:* wss://localhost:* blob:; frame-src 'self' https://cdn.plaid.com https://www.google.com https://www.recaptcha.net https://recaptcha.google.com blob:; img-src 'self' data: blob: https://www.gstatic.com https://www.google.com https://cdn.plaid.com; style-src 'self' 'unsafe-inline' https://www.gstatic.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://www.gstatic.com;" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
