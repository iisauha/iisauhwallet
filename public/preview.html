<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Preview – iisauhwallet</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1a1a1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .device-frame {
      --phone-width: 390px;
      --phone-height: 844px;
      --phone-radius: 54px;
      --phone-notch-h: 34px;
      --phone-notch-w: 150px;
      width: var(--phone-width);
      height: var(--phone-height);
      border-radius: var(--phone-radius);
      background: #0d0d0f;
      box-shadow:
        0 0 0 12px #1c1c1e,
        0 0 0 14px #2a2a2e,
        0 32px 64px rgba(0,0,0,0.5),
        inset 0 0 0 2px rgba(255,255,255,0.06);
      padding: 12px;
      position: relative;
    }
    .device-screen {
      width: 100%;
      height: 100%;
      border-radius: calc(var(--phone-radius) - 12px);
      overflow: hidden;
      background: #0b0b0f;
      position: relative;
    }
    .device-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: var(--phone-notch-w);
      height: var(--phone-notch-h);
      background: #0d0d0f;
      border-radius: 0 0 20px 20px;
      z-index: 2;
    }
    .device-iframe-wrap {
      position: absolute;
      inset: 0;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    .device-iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .preview-badge {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      background: rgba(0,0,0,0.6);
      color: rgba(255,255,255,0.8);
      font-size: 11px;
      border-radius: 20px;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="device-frame">
    <div class="device-screen">
      <div class="device-notch" aria-hidden="true"></div>
      <div class="device-iframe-wrap">
        <iframe
          id="app-frame"
          src="/iisauhwallet/"
          title="iisauhwallet app"
        ></iframe>
      </div>
    </div>
  </div>
  <div class="preview-badge">Live preview · edits in /src reload via Vite HMR</div>
</body>
</html>
